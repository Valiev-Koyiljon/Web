<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Research — Koyilbek Valiev</title>
    <meta name="description" content="Research papers, tutorials, and notes by Koyilbek Valiev." />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/shared.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* ============================================
           RESEARCH-SPECIFIC STYLES
           ============================================ */

        /* FILTERS */
        .filters {
            padding: 1.5rem 0;
            display: flex; gap: 0.5rem; flex-wrap: wrap;
            border-bottom: 1px solid var(--border-light);
        }

        .filter-btn {
            font-family: 'Inter', sans-serif;
            font-size: 0.82rem; font-weight: 500;
            padding: 0.4rem 1rem; border-radius: 6px;
            background: var(--bg); border: 1px solid var(--border);
            color: var(--text-muted); cursor: pointer;
            transition: var(--transition);
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--accent-light);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ITEMS LIST */
        .items-list {
            padding: 2rem 0;
            display: flex; flex-direction: column; gap: 1rem;
        }

        .item-card {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            transition: var(--transition);
            cursor: pointer;
        }

        .item-card:hover {
            border-color: var(--accent);
            box-shadow: var(--shadow-sm);
        }

        .item-card-header {
            display: flex; justify-content: space-between;
            align-items: flex-start; gap: 1rem; margin-bottom: 0.5rem;
        }

        .item-card h3 {
            font-size: 1rem; font-weight: 700; color: var(--text);
            line-height: 1.4;
        }

        .item-type {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem; font-weight: 600;
            padding: 0.2rem 0.6rem; border-radius: 4px;
            white-space: nowrap; text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .item-type.paper { background: #eff6ff; color: #2563eb; }
        .item-type.tutorial { background: #f0fdf4; color: #16a34a; }
        .item-type.note { background: #fefce8; color: #ca8a04; }
        .item-type.project { background: #faf5ff; color: #9333ea; }
        .item-type.patent { background: #fff1f2; color: #be123c; }

        .item-meta {
            font-size: 0.82rem; color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .item-description {
            font-size: 0.88rem; color: var(--text-secondary);
            line-height: 1.6;
        }

        .item-status {
            display: inline-flex; align-items: center; gap: 0.3rem;
            font-size: 0.75rem; font-weight: 600; margin-top: 0.5rem;
        }

        .item-status.published { color: #16a34a; }
        .item-status.preprint { color: #ca8a04; }
        .item-status.draft { color: var(--text-muted); }

        /* DETAIL VIEW */
        .detail-overlay {
            display: none;
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3); z-index: 200;
        }

        .detail-overlay.open { display: block; }

        .detail-panel {
            position: fixed; top: 0; right: 0; bottom: 0;
            width: min(700px, 90vw);
            background: var(--bg);
            border-left: 1px solid var(--border);
            box-shadow: -8px 0 30px rgba(0,0,0,0.1);
            z-index: 201;
            overflow-y: auto;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }

        .detail-panel.open { transform: translateX(0); }

        .detail-header {
            position: sticky; top: 0;
            background: var(--bg);
            border-bottom: 1px solid var(--border-light);
            padding: 1rem 1.5rem;
            display: flex; align-items: center; gap: 1rem;
        }

        .detail-close {
            background: none; border: none; cursor: pointer;
            font-size: 1.1rem; color: var(--text-muted);
            padding: 0.25rem; transition: var(--transition);
        }

        .detail-close:hover { color: var(--text); }

        .detail-header h2 {
            font-size: 0.9rem; font-weight: 600;
            color: var(--text); flex: 1;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .detail-body { padding: 2rem 1.5rem; }

        /* MARKDOWN RENDERED CONTENT */
        .detail-body h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 1rem; letter-spacing: -0.02em; }
        .detail-body h2 { font-size: 1.2rem; font-weight: 700; margin-top: 2rem; margin-bottom: 0.75rem; color: var(--text); }
        .detail-body h3 { font-size: 1.05rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.5rem; }
        .detail-body p { margin-bottom: 1rem; font-size: 0.92rem; color: var(--text-secondary); line-height: 1.8; }
        .detail-body strong { color: var(--text); }
        .detail-body a { color: var(--accent); text-decoration: none; }
        .detail-body a:hover { text-decoration: underline; }
        .detail-body ul, .detail-body ol { margin-bottom: 1rem; padding-left: 1.5rem; }
        .detail-body li { font-size: 0.92rem; color: var(--text-secondary); line-height: 1.8; margin-bottom: 0.25rem; }
        .detail-body code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem; background: var(--bg-alt);
            border: 1px solid var(--border); border-radius: 4px;
            padding: 0.15rem 0.4rem;
        }
        .detail-body pre {
            background: var(--bg-alt); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 1rem;
            overflow-x: auto; margin-bottom: 1rem;
        }
        .detail-body pre code { background: none; border: none; padding: 0; font-size: 0.8rem; line-height: 1.6; }
        .detail-body blockquote { border-left: 3px solid var(--accent); padding-left: 1rem; margin-bottom: 1rem; color: var(--text-muted); font-style: italic; }
        .detail-body img { max-width: 100%; border-radius: var(--radius); margin: 1rem 0; }
        .detail-body hr { border: none; border-top: 1px solid var(--border-light); margin: 2rem 0; }
        .detail-body table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
        .detail-body th, .detail-body td { padding: 0.5rem 0.75rem; border: 1px solid var(--border); font-size: 0.85rem; text-align: left; }
        .detail-body th { background: var(--bg-alt); font-weight: 600; }

        /* EMPTY / LOADING */
        .empty-state { text-align: center; padding: 4rem 0; color: var(--text-muted); font-size: 0.9rem; }
        .empty-state i { font-size: 2rem; margin-bottom: 1rem; display: block; }
        .loading { text-align: center; padding: 3rem 0; color: var(--text-muted); font-size: 0.9rem; }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .detail-panel { width: 100vw; }
            .item-card-header { flex-direction: column; gap: 0.5rem; }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="nav" role="navigation" aria-label="Main navigation">
        <div class="nav-inner">
            <a href="index.html" class="nav-name">Koyilbek Valiev</a>
            <button class="nav-hamburger" aria-label="Toggle menu" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="research.html" class="active">Research</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="articles.html">Articles</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h1>Research &amp; Resources</h1>
            <p>Papers, tutorials, and notes. Click any item to read the full content.</p>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="paper">Papers</button>
            <button class="filter-btn" data-filter="tutorial">Tutorials</button>
            <button class="filter-btn" data-filter="note">Notes</button>
            <button class="filter-btn" data-filter="patent">Patents</button>
        </div>

        <div class="items-list" id="items-list">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
        </div>
    </main>

    <!-- Detail slide-in panel -->
    <div class="detail-overlay" id="detail-overlay"></div>
    <div class="detail-panel" id="detail-panel">
        <div class="detail-header">
            <button class="detail-close" id="detail-close" aria-label="Close">
                <i class="fas fa-times"></i>
            </button>
            <h2 id="detail-title">Title</h2>
        </div>
        <div class="detail-body" id="detail-body"></div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Koyilbek Valiev. Built with care.</p>
        </div>
    </footer>

    <script>
        const RESEARCH_DIR = 'research';
        let items = [];
        let currentFilter = 'all';

        async function loadItems() {
            try {
                const res = await fetch(`${RESEARCH_DIR}/registry.json`);
                if (!res.ok) throw new Error('registry.json not found');
                const folders = await res.json();

                const loaded = await Promise.all(
                    folders.map(async (folder) => {
                        try {
                            const metaRes = await fetch(`${RESEARCH_DIR}/${folder}/meta.json`);
                            if (!metaRes.ok) return null;
                            const meta = await metaRes.json();
                            return { ...meta, folder };
                        } catch { return null; }
                    })
                );

                items = loaded.filter(Boolean).sort((a, b) =>
                    new Date(b.date || '2000-01-01') - new Date(a.date || '2000-01-01')
                );
                renderItems();
            } catch {
                document.getElementById('items-list').innerHTML =
                    '<div class="empty-state"><i class="fas fa-folder-open"></i>No research items found yet.<br/>Add folders to <code>research/</code> and update <code>registry.json</code>.</div>';
            }
        }

        function renderItems() {
            const list = document.getElementById('items-list');
            const filtered = currentFilter === 'all' ? items : items.filter(i => i.type === currentFilter);

            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-state"><i class="fas fa-folder-open"></i>No items in this category yet.</div>';
                return;
            }

            list.innerHTML = filtered.map(item => `
                <div class="item-card" data-folder="${item.folder}">
                    <div class="item-card-header">
                        <h3>${item.title}</h3>
                        <span class="item-type ${item.type}">${item.type}</span>
                    </div>
                    <div class="item-meta">
                        ${item.date ? formatDate(item.date) : ''}
                        ${item.venue ? ' &mdash; ' + item.venue : ''}
                    </div>
                    ${item.description ? `<div class="item-description">${item.description}</div>` : ''}
                    ${item.status ? `<div class="item-status ${item.status}"><i class="fas fa-circle" style="font-size:0.4rem"></i> ${item.status}</div>` : ''}
                </div>
            `).join('');

            list.querySelectorAll('.item-card').forEach(card => {
                card.addEventListener('click', () => openDetail(card.dataset.folder));
            });
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short' });
        }

        async function openDetail(folder) {
            const item = items.find(i => i.folder === folder);
            if (!item) return;

            const panel = document.getElementById('detail-panel');
            const overlay = document.getElementById('detail-overlay');
            const title = document.getElementById('detail-title');
            const body = document.getElementById('detail-body');

            title.textContent = item.title;
            body.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading...</div>';

            overlay.classList.add('open');
            requestAnimationFrame(() => { panel.classList.add('open'); });
            document.body.style.overflow = 'hidden';

            try {
                const res = await fetch(`${RESEARCH_DIR}/${folder}/README.md`);
                if (!res.ok) throw new Error('README.md not found');
                const md = await res.text();
                body.innerHTML = marked.parse(md);
            } catch {
                body.innerHTML = `
                    <h1>${item.title}</h1>
                    ${item.description ? `<p>${item.description}</p>` : ''}
                    ${item.venue ? `<p><strong>Venue:</strong> ${item.venue}</p>` : ''}
                    ${item.link ? `<p><a href="${item.link}" target="_blank" rel="noopener">View Paper &rarr;</a></p>` : ''}
                    <p style="color: var(--text-muted); margin-top: 2rem;"><em>No README.md found. Add one to show full content here.</em></p>
                `;
            }
        }

        function closeDetail() {
            document.getElementById('detail-panel').classList.remove('open');
            document.getElementById('detail-overlay').classList.remove('open');
            document.body.style.overflow = '';
        }

        document.getElementById('detail-close').addEventListener('click', closeDetail);
        document.getElementById('detail-overlay').addEventListener('click', closeDetail);
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderItems();
            });
        });

        const hamburger = document.querySelector('.nav-hamburger');
        const navLinks = document.querySelector('.nav-links');
        hamburger.addEventListener('click', () => {
            const open = navLinks.classList.toggle('open');
            hamburger.setAttribute('aria-expanded', open);
        });

        loadItems();
    </script>
</body>
</html>
